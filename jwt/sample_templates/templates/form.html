{% extends "base.html" %}
{% block content %}
  <img src="/static/logo.png" class="logo" alt="logo">
  <h1>{{ form.title }}</h1>
  <div class="meta">{{ form.time_range }}</div>
  <p class="subtitle">{{ form.subtitle }}</p>

  <form method="post" action="{{ url_for('form') }}?id={{ form.id | urlencode }}">
    <div class="row">
      <div class="col">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="col">
        <label>姓名</label>
        <input type="text" name="name" required>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label>Discord ID</label>
        <input type="text" name="discord_id" placeholder="name#1234">
      </div>
      <div class="col">
        <label>是否有在初賽與其他隊伍競賽</label>
        <select name="competed_before">
          <option value="">請選擇</option>
          <option>有</option>
          <option>沒有</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label>主要專長</label>
        <textarea name="primary_skill" required></textarea>
      </div>
      <div class="col">
        <label>次要專長</label>
        <textarea name="secondary_skill"></textarea>
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label>在決賽中可以為大家做到什麼</label>
        <textarea name="what_can_do"></textarea>
      </div>
      <div class="col">
        <label>對於以線上支援比賽和在會場（台北文創）附近大家住旅館一起打比賽的意向?（如果只想線上也一定要講喔）</label>
        <textarea name="onsite_intent"></textarea>
      </div>
    </div>

    <div class="row">
      <div class="col" style="flex:1 1 100%;">
        <label>其他想說的</label>
        <textarea name="other"></textarea>
      </div>
    </div>

    <div class="actions">
      <button type="submit">送出報名</button>
    </div>
  </form>
{% endblock %}
