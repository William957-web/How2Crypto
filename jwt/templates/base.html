<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}JWT CTF{% endblock %}</title>
  <style>
    :root {
      --paper: rgba(253, 247, 234, 0.97);
      --paper-strong: rgba(255, 252, 244, 0.99);
      --ink: #221d16;
      --muted: #665b4d;
      --gold: #b9872e;
      --gold-deep: #8d6113;
      --accent: #1f8cff;
      --line: rgba(93, 67, 33, 0.18);
      --ok: #1f6a45;
      --bad: #952f2f;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background: url('/static/background.jpg') center/cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255, 221, 155, 0.18), transparent 34%),
        rgba(9, 9, 9, 0.52);
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1100px, calc(100vw - 32px));
      margin: 32px auto;
      padding: 28px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--paper) 0%, var(--paper-strong) 100%);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .masthead {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
    }

    .logo {
      width: 96px;
      height: auto;
      flex: 0 0 auto;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      color: var(--gold-deep);
      margin-bottom: 8px;
      font-weight: 700;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 6px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.06;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .lede, .muted {
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .level-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      padding: 18px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(3px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(185, 135, 46, 0.12);
      color: var(--gold-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    a.button, button {
      appearance: none;
      border: 0;
      cursor: pointer;
      border-radius: 8px;
      padding: 10px 16px;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      background: #1f8cff;
      box-shadow: none;
    }

    a.subtle {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    code, pre, textarea, input {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    .token-box, .source-box {
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(30, 46, 64, 0.16);
      background: rgba(24, 31, 39, 0.96);
      color: #ecf2f8;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .source-box {
      max-height: 520px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      resize: vertical;
      font-size: 14px;
    }

    .flash {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: 600;
    }

    .flash.ok {
      background: rgba(31, 106, 69, 0.12);
      color: var(--ok);
      border: 1px solid rgba(31, 106, 69, 0.18);
    }

    .flash.bad {
      background: rgba(149, 47, 47, 0.1);
      color: var(--bad);
      border: 1px solid rgba(149, 47, 47, 0.14);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
    }

    .list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
    }

    @media (max-width: 840px) {
      .shell {
        width: min(1100px, calc(100vw - 20px));
        margin: 10px auto;
        padding: 20px;
      }

      .masthead {
        align-items: flex-start;
        flex-direction: column;
      }

      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
